<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC Flip & Learn</title>
    <style>
        :root {
            /* CHANGE THESE COLORS TO TWEAK THE THEME */
            --primary-blue: #1a237e;  /* Now for the Front */
            --white: #ffffff;        /* Now for the Back */
            --accent-gold: #ffc107;   /* For headings on the blue side */
            --text-dark: #2c3e50;    /* For text on the white side */
            --bg-gray: #f0f2f5;      /* Page background */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary-blue); margin: 0; }
        .progress-text { color: #555; margin-top: 5px; font-weight: bold; }

        /* The Card Container */
        .card-container {
            width: 90%;
            max-width: 500px;
            height: 400px;
            perspective: 1200px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .is-flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* FRONT CARD: Blue Background, White Text */
        .card-front { 
            background: var(--primary-blue); 
            color: white; 
            border: none;
        }

        /* BACK CARD: White Background, Dark Text */
        .card-back { 
            background: var(--white); 
            color: var(--text-dark); 
            transform: rotateY(180deg); 
            text-align: left;
            align-items: flex-start;
            border: 2px solid var(--primary-blue);
        }

        .card-front h2 { color: var(--accent-gold); font-size: 2rem; }
        .card-back h3 { color: var(--primary-blue); margin-top: 0; border-bottom: 2px solid var(--accent-gold); padding-bottom: 5px; width: 100%; }
        .card-back ul { padding-left: 20px; font-size: 1.05rem; line-height: 1.6; }

        /* Controls */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 30px;
            border: 2px solid var(--primary-blue);
            border-radius: 10px;
            background: var(--primary-blue);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:disabled { background: #bdc3c7; border-color: #bdc3c7; cursor: not-allowed; }
        .btn:hover:not(:disabled) { background: #283593; transform: scale(1.05); }

        .hint { margin-top: 15px; font-size: 0.85rem; opacity: 0.8; color: white; }
    </style>
</head>
<body>

<header>
    <h1>Flip & Learn</h1>
    <div class="progress-text" id="progressText">Question 1 of 20</div>
</header>

<div class="card-container" onclick="toggleFlip()">
    <div class="card-inner" id="cardInner">
        <div class="card-front">
            <h2 id="questionText">Loading...</h2>
            <p class="hint"> Flip for answer</p>
        </div>
        <div class="card-back">
            <h3 id="answerTitle">Answer</h3>
            <ul id="answerPoints"></ul>
        </div>
    </div>
</div>

<div class="controls">
    <button class="btn" id="prevBtn" onclick="prevCard()">Previous</button>
    <button class="btn" id="nextBtn" onclick="nextCard()">Next</button>
</div>

<script>
    
    const upscData = [
        { q: "Article 110", a: "Money Bill", p: ["Only introduced in Lok Sabha.", "President's prior recommendation needed.", "Speaker decides if a bill is a Money Bill."] },
        { q: "CRR (Cash Reserve Ratio)", a: "Monetary Policy Tool", p: ["Share of NDTL that banks keep with RBI.", "RBI pays no interest on this.", "High CRR reduces liquidity in market."] },
        { q: "Regulating Act 1773", a: "Constitutional History", p: ["First step by British Govt to control EIC.", "Designated Governor of Bengal as Governor-General.", "Established SC at Calcutta (1774)."] },
        { q: "Black Soil", a: "Geography", p: ["Also known as Regur Soil.", "High water retaining capacity.", "Best suited for Cotton cultivation."] },
        { q: "Article 44", a: "DPSP", p: ["Uniform Civil Code for citizens.", "State shall endeavor to secure for all citizens.", "Currently implemented only in Goa."] },
        { q: "Vijayanagara Empire", a: "Medieval History", p: ["Founded by Harihara and Bukka in 1336.", "Hampi was the capital.", "Reached its peak under KrishDeva Raya."] },
        { q: "Montreal Protocol", a: "Environment", p: ["Signed in 1987.", "Aims to phase out Ozone Depleting Substances (ODS).", "Considered the most successful green treaty."] },
        { q: "Gini Coefficient", a: "Economy", p: ["Measures income inequality.", "0 = Perfect equality.", "1 = Perfect inequality."] },
        { q: "Sixth Schedule", a: "Polity", p: ["Administration of tribal areas in AMTM.", "Assam, Meghalaya, Tripura, Mizoram.", "Autonomous District Councils have power."] },
        { q: "Battle of Buxar (1764)", a: "Modern History", p: ["EIC vs Joint forces of Mir Qasim, Shuja-ud-Daula, Shah Alam II.", "Resulted in Treaty of Allahabad.", "EIC got Diwani rights."] },
        { q: "Nilgiri Biosphere Reserve", a: "Geography", p: ["First BR in India (1986).", "Includes Mudumalai, Wayanad, Bandipur, Nagarhole.", "Home to Lion-tailed Macaque."] },
        { q: "Article 280", a: "Finance Commission", p: ["Quasi-judicial body appointed every 5 years.", "President appoints members.", "Recommends distribution of taxes between Centre & States."] },
        { q: "Ramsar Convention", a: "Environment", p: ["Signed in 1971 in Iran.", "Focuses on conservation of Wetlands.", "World Wetlands Day: February 2nd."] },
        { q: "Gandhiji's 1st Hunger Strike", a: "History", p: ["Ahmedabad Mill Strike (1918).", "Over the issue of Plague Bonus.", "Successfully got 35% wage hike."] },
        { q: "Fundamental Duties", a: "Polity", p: ["Added by 42nd Amendment, 1976.", "Based on Swaran Singh Committee.", "Inspired by USSR Constitution."] },
        { q: "GDP vs GVA", a: "Economy", p: ["GDP = GVA + Taxes - Subsidies.", "GVA gives sector-specific picture.", "GDP shows overall economic growth."] },
        { q: "Western Ghats", a: "Geography", p: ["Also known as Sahyadri.", "UNESCO World Heritage site.", "Higher than Eastern Ghats, continuous."] },
        { q: "Lothal", a: "Ancient History", p: ["Dockyard of Indus Valley Civilization.", "Located in Gujarat (Bhogava river).", "Evidence of rice husk found."] },
        { q: "Quo-Warranto", a: "Polity (Writs)", p: ["Means 'By what authority'.", "Issued to prevent illegal usurpation of public office.", "Can be sought by any interested person."] },
        { q: "Blue Carbon", a: "Environment", p: ["Carbon stored in coastal and marine ecosystems.", "Includes mangroves, seagrasses, salt marshes.", "Sequestered 10x faster than terrestrial forests."] },
        { q: "Article 21", a: "Right to Life & Liberty", p: ["No person shall be deprived of life except by procedure established by law.", "Includes Right to Privacy (Puttaswamy Case).", "Includes Right to Clean Environment."] },
        { q: "Golden Quadrilateral", a: "Infrastructure", p: ["Connects Delhi, Mumbai, Chennai, and Kolkata.", "Managed by NHAI.", "Aims to reduce travel time between major metros."] },
    { q: "Hampi", a: "Art & Culture", p: ["Located on the banks of Tungabhadra river.", "Capital of Vijayanagara Empire.", "UNESCO World Heritage Site famous for stone chariot."] },
    { q: "Kyoto Protocol", a: "Environment", p: ["Adopted in 1997, entered force in 2005.", "Focuses on reducing Greenhouse Gas emissions.", "Introduced 'Carbon Credits' and 'Clean Development Mechanism'."] },
    { q: "Article 368", a: "Amendment Power", p: ["Power of Parliament to amend the Constitution.", "Cannot alter the 'Basic Structure' (Kesavananda Bharati).", "Some amendments require 50% state ratification."] },
    { q: "MCLR", a: "Economy", p: ["Marginal Cost of funds-based Lending Rate.", "Internal benchmark rate for banks to set interest rates.", "Replaced the old 'Base Rate' system in 2016."] },
    { q: "Dandi March", a: "Modern History", p: ["Started March 12, 1930, from Sabarmati Ashram.", "Ended at Dandi to break the Salt Law.", "Launched the Civil Disobedience Movement."] },
    { q: "Bhitarkanika", a: "Geography/Environment", p: ["Located in Odisha.", "Famous for Saltwater Crocodiles.", "Second largest Mangrove ecosystem in India."] },
    { q: "Article 72", a: "Pardoning Power", p: ["President's power to grant pardons, reprieves, or remissions.", "Independent of the Judiciary.", "Includes the power to pardon death sentences."] },
    { q: "Open Market Operations", a: "Economy (RBI)", p: ["Buying and selling of Govt Securities (G-Secs) by RBI.", "Used to regulate liquidity in the economy.", "Selling G-Secs sucks out excess liquidity."] },
    { q: "Harappan Script", a: "Ancient History", p: ["Boustrophedon style (written right to left, then left to right).", "Pictographic in nature.", "Has not been deciphered yet."] },
    { q: "Coral Bleaching", a: "Environment", p: ["Occurs when corals expel algae (Zooxanthellae) due to stress.", "Caused by rising sea temperatures and acidification.", "Corals turn white and can die if stress continues."] },
    { q: "Curative Petition", a: "Polity (Judiciary)", p: ["Last legal resort after a review petition is dismissed.", "Origin: Rupa Ashok Hurra vs Ashok Hurra case (2002).", "Heard by the three most senior judges."] },
    { q: "Agni-V", a: "Defense / S&T", p: ["Intercontinental Ballistic Missile (ICBM).", "Range: Over 5,000 km.", "Developed by DRDO, features MIRV technology."] },
    { q: "Roaring Forties", a: "Geography", p: ["Strong westerly winds in Southern Hemisphere.", "Found between 40° and 50° latitude.", "Caused by lack of landmass to slow winds down."] },
    { q: "Article 143", a: "Advisory Jurisdiction", p: ["President can seek opinion of Supreme Court.", "SC is not bound to give an opinion in all cases.", "Opinion given by SC is not binding on the President."] },
    { q: "Phaltan / Satara", a: "Modern History", p: ["Centers of the Parallel Government (Prati Sarkar).", "Led by Nana Patil during Quit India Movement.", "Ran a fully functional administration."] },
    { q: "E-Rupee (e₹)", a: "Economy (Digital)", p: ["Central Bank Digital Currency (CBDC).", "Digital version of physical cash issued by RBI.", "Uses blockchain-regulated tokens."] },
    { q: "Ramsar: Montreux Record", a: "Environment", p: ["Register of wetland sites under threat.", "Currently, Keoladeo NP (Rajasthan) and Loktak Lake (Manipur) are listed.", "Chilika Lake was removed after restoration."] },
    { q: "Equator Countries", a: "Geography", p: ["Passes through 13 countries.", "Ecuador, Colombia, Brazil in South America.", "Gabon, Congo, Uganda, Kenya in Africa."] }
    ];

    let currentIndex = 0;

    function updateCard() {
        const card = upscData[currentIndex];
        document.getElementById('questionText').innerText = card.q;
        document.getElementById('answerTitle').innerText = card.a;
        document.getElementById('progressText').innerText = `Question ${currentIndex + 1} of ${upscData.length}`;
        
        const pointsList = document.getElementById('answerPoints');
        pointsList.innerHTML = card.p.map(point => `<li>${point}</li>`).join('');

        document.getElementById('cardInner').classList.remove('is-flipped');
        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === upscData.length - 1;
    }

    function toggleFlip() {
        document.getElementById('cardInner').classList.toggle('is-flipped');
    }

    function nextCard() {
        if (currentIndex < upscData.length - 1) {
            currentIndex++;
            updateCard();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    updateCard();
</script>

</body>
</html>
